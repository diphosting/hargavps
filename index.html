<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kas TKR-A Compact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e3c72; --blue-light: #2a5298; --success: #00b09b; --danger: #ff416c; }
        
        body {
            font-family: 'Poppins', sans-serif; margin: 0; padding: 10px;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden; box-sizing: border-box;
        }

        /* Animasi Objek Geometris */
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .shape { position: absolute; background: rgba(255,255,255,0.1); animation: move 15s linear infinite; bottom: -100px; }
        .circle { border-radius: 50%; width: 50px; height: 50px; }
        .square { width: 40px; height: 40px; }
        @keyframes move { from { transform: translateY(0) rotate(0); opacity: 0.5; } to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }

        /* Card Teroptimasi (Lebih Kecil) */
        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 20px; border-radius: 20px;
            width: 100%; max-width: 360px; /* Ukuran diperkecil */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
        }

        /* Menu Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-menu { cursor: pointer; padding: 5px; }
        .btn-menu div { width: 20px; height: 2px; background: var(--blue); margin: 4px 0; }

        .side-menu {
            position: absolute; top: 0; right: -100%; width: 100%; height: 100%;
            background: white; z-index: 10; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .side-menu.active { right: 0; }

        /* Tabel & Input Ringkas */
        h2 { font-size: 18px; margin: 0; color: var(--blue); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
        
        .scroll-table { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #f5f5f5; }
        .name-td { font-weight: 600; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .hidden { display: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 15px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

<div class="bg-shapes" id="shapes"></div>

<div class="card">
    <div class="header">
        <h2 id="titleText">Kas TKR-A</h2>
        <div class="btn-menu" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
    </div>

    <div class="side-menu" id="sideMenu">
        <button onclick="toggleMenu()" style="position:absolute; top:10px; right:10px; border:none; background:none; font-size:20px;">×</button>
        <p style="font-weight:600; color:var(--blue)">MENU UTAMA</p>
        <button class="btn-main" onclick="location.reload()" style="width:80%; margin-bottom:10px;">Beranda</button>
        <button class="btn-main" onclick="gantiView('viewAdminLogin')" style="width:80%; background:#444;">Admin</button>
    </div>

    <div id="viewLogin">
        <input type="text" id="cariNama" placeholder="Ketik namamu (Ardi, Zainal, dll)">
        <button class="btn-main" onclick="loginSiswa()">Cek Tagihan</button>
    </div>

    <div id="viewSiswa" class="hidden">
        <p id="labelUser" style="font-weight:600; margin:0; font-size:14px; color:var(--blue)"></p>
        <div class="scroll-table">
            <table>
                <tbody id="listSiswa"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="location.reload()" style="margin-top:10px; background:#888;">Keluar</button>
    </div>

    <div id="viewAdmin" class="hidden">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
            <span>Saldo: <b id="saldo">0</b></span>
            <span>Pending: <b id="pend">0</b></span>
        </div>
        <div class="scroll-table" style="max-height: 250px;">
            <table><tbody id="listAdmin"></tbody></table>
        </div>
        <button class="btn-main" onclick="location.reload()" style="margin-top:10px;">Logout</button>
    </div>

    <div id="viewAdminLogin" class="hidden">
        <input type="password" id="pass" placeholder="Password Admin">
        <button class="btn-main" onclick="authAdmin()">Login Admin</button>
    </div>
</div>

<div id="modalBayar" class="modal">
    <div class="modal-content">
        <p style="font-weight:600; font-size:14px;">Pilih Metode Pembayaran</p>
        <select id="metode" onchange="showQR()" style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px;">
            <option value="tunai">Tunai</option>
            <option value="qris">QRIS</option>
        </select>
        <img id="qrisImg" src="https://files.catbox.moe/409cau.png" style="width:100%; display:none; margin-bottom:10px; border-radius:10px;">
        <button class="btn-main" onclick="submitBayar()">Konfirmasi</button>
        <button onclick="hideModal()" style="border:none; background:none; color:red; margin-top:10px; font-size:12px;">Batal</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'kas_data');

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    let dataKas = {};
    let user = "";
    let week = 0;

    // Background Animation
    const bg = document.getElementById('shapes');
    for(let i=0; i<10; i++){
        const s = document.createElement('div');
        s.className = 'shape ' + (Math.random() > 0.5 ? 'circle' : 'square');
        s.style.left = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 10 + 's';
        bg.appendChild(s);
    }

    onValue(dbRef, (s) => {
        dataKas = s.val() || {};
        if(!document.getElementById('viewAdmin').classList.contains('hidden')) renderAdmin();
    });

    window.toggleMenu = () => {
        document.getElementById('sideMenu').classList.toggle('active');
    };

    window.gantiView = (id) => {
        document.querySelectorAll('[id^="view"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id !== 'viewAdmin') toggleMenu();
    };

    // FUNGSI LOGIN: DIJAMIN BISA TEMUKAN ARDI
    window.loginSiswa = () => {
        const input = document.getElementById('cariNama').value.toLowerCase().replace(/[^a-z]/g, "");
        if(input.length < 2) return alert("Ketik minimal 2 huruf");

        const hasil = daftarSiswa.filter(n => n.toLowerCase().replace(/[^a-z]/g, "").includes(input));

        if(hasil.length === 1) {
            user = hasil[0];
            renderSiswa();
        } else if(hasil.length > 1) {
            // Jika ada banyak, cari yang paling pas
            const exact = hasil.find(n => n.toLowerCase().split(' ').includes(document.getElementById('cariNama').value.toLowerCase().trim()));
            if(exact) { user = exact; renderSiswa(); }
            else alert("Nama kurang spesifik!");
        } else {
            alert("Nama tidak ditemukan!");
        }
    };

    function renderSiswa() {
        gantiView('viewSiswa');
        document.getElementById('labelUser').innerText = user;
        let h = "";
        for(let i=1; i<=4; i++){
            let s = dataKas[user.replace(/\s/g, '_') + "_m" + i] || "belum";
            let icon = s==='lunas'?'✅':(s==='pending'?'⏳':'⬜');
            h += `<tr><td>M${i}</td><td>${icon}</td><td>${s==='belum'?`<button onclick="window.showPay(${i})" style="font-size:10px; padding:4px 8px; background:var(--success); color:white; border:none; border-radius:5px;">Bayar</button>`:'-'}</td></tr>`;
        }
        document.getElementById('listSiswa').innerHTML = h;
    }

    window.showPay = (m) => { week = m; document.getElementById('modalBayar').style.display='flex'; };
    window.hideModal = () => document.getElementById('modalBayar').style.display='none';
    window.showQR = () => { document.getElementById('qrisImg').style.display = document.getElementById('metode').value === 'qris' ? 'block' : 'none'; };

    window.submitBayar = () => {
        const m = document.getElementById('metode').value;
        update(dbRef, { [user.replace(/\s/g, '_') + "_m" + week]: "pending" });
        window.open(`https://wa.me/62895630224260?text=Konfirmasi Kas ${user} M${week} (${m})`, '_blank');
        hideModal();
    };

    window.authAdmin = () => {
        if(document.getElementById('pass').value === 'bendahara123') { gantiView('viewAdmin'); renderAdmin(); }
        else alert("Salah!");
    };

    function renderAdmin() {
        let total = 0, pend = 0;
        document.getElementById('listAdmin').innerHTML = daftarSiswa.map(n => {
            let row = `<td class="name-td">${n.split(' ')[0]}</td>`;
            for(let i=1; i<=4; i++){
                let s = dataKas[n.replace(/\s/g, '_') + "_m" + i] || "belum";
                if(s==='lunas') total++; if(s==='pending') pend++;
                let icon = s==='lunas'?'✅':(s==='pending'?'⏳':'⬜');
                row += `<td onclick="window.upStatus('${n}',${i},'${s}')">${icon}</td>`;
            }
            return `<tr>${row}</tr>`;
        }).join('');
        document.getElementById('saldo').innerText = "Rp" + (total * 2000).toLocaleString();
        document.getElementById('pend').innerText = pend;
    }

    window.upStatus = (n, m, c) => {
        let next = c==='belum'?'pending':(c==='pending'?'lunas':'belum');
        update(dbRef, { [n.replace(/\s/g, '_') + "_m" + m]: next });
    };
</script>
</body>
</html>
