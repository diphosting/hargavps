<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REKAP KAS TKR-A</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF3D71; --primary: #6236FF; --success: #00D68F; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Outfit', sans-serif; margin: 0; padding: 0; background: #060918; color: #1A1A1A; overflow-x: hidden; }
        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 0% 0%, #1a1e3b 0%, #060918 100%); }
        .app-frame { width: 100%; max-width: 450px; min-height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }
        header { padding: 40px 25px 20px; text-align: center; color: white; }
        .main-card { background: var(--glass); margin: 0 15px 100px; padding: 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .search-box { background: #EDF1F7; border-radius: 15px; padding: 12px 15px; margin: 15px 0; display: flex; align-items: center; }
        input { border: none; background: transparent; width: 100%; outline: none; font-family: inherit; font-size: 16px; }
        .btn-action { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-action:active { transform: scale(0.98); }
        .admin-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .status-btn { font-size: 26px; cursor: pointer; padding: 5px; display: inline-block; -webkit-tap-highlight-color: transparent; }
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: white; padding: 12px; border-radius: 20px; display: flex; justify-content: space-around; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 100; }
        .nav-link { text-decoration: none; color: #8F9BB3; font-weight: 600; font-size: 14px; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .hidden { display: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
        .m-box { background: white; padding: 25px; border-radius: 25px; width: 85%; text-align: center; }
    </style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="app-frame">
    <header><h1>KAS TKR-A 🚀</h1><p style="opacity:0.7">Powered By Tobias</p></header>

    <div id="viewLogin" class="main-card">
        <h3 style="margin:0;">Cek Tagihan Kas</h3>
        <div class="search-box"><input type="text" id="inNama" placeholder="Ketik nama (Contoh: Tobias)"></div>
        <button class="btn-action" onclick="cekNama()">Buka Laporan ✨</button>
    </div>

    <div id="viewSiswa" class="main-card hidden">
        <h2 id="txtUser" style="color: var(--primary); margin:0;">User</h2>
        <div id="listMingguan" style="margin-top:20px;"></div>
        <button class="btn-action" onclick="window.location.reload()" style="background:#8F9BB3; margin-top:20px;">Keluar</button>
    </div>

    <div id="viewAdmin" class="main-card hidden">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <div style="background:#f0f3f8; padding:15px; border-radius:15px;">Saldo Lunas:<br><b id="admSaldo" style="color:var(--success); font-size:18px;">Rp0</b></div>
            <div style="background:#f0f3f8; padding:15px; border-radius:15px;">Pending:<br><b id="admPend" style="color:orange; font-size:18px;">0</b></div>
        </div>
        <div style="max-height: 450px; overflow-y: auto;" id="listAdmSiswa"></div>
    </div>

    <div id="viewAdminLogin" class="main-card hidden">
        <h3>Akses Bendahara</h3>
        <input type="password" id="pAdm" class="search-box" style="width:100%; box-sizing:border-box;" placeholder="Password">
        <button class="btn-action" onclick="authAdmin()">Login Admin</button>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" id="navHome" onclick="window.location.reload()">Beranda</div>
        <div class="nav-link" id="navAdmin" onclick="gView('viewAdminLogin')">Admin</div>
    </div>
</div>

<div id="modalPay" class="modal">
    <div class="m-box">
        <h3>Bayar Kas</h3>
        <select id="metod" class="search-box" style="width:100%; border:none; font-family:inherit;">
            <option value="tunai">Tunai</option><option value="qris">QRIS</option>
        </select>
        <img id="qImg" src="https://files.catbox.moe/409cau.png" style="width:100%; border-radius:15px; display:none; margin-bottom:15px;">
        <button class="btn-action" onclick="konfirmasiWA()">Kirim Bukti WA</button>
        <p onclick="closeM()" style="color:var(--accent); cursor:pointer; margin-top:15px;">Batal</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'kas_data');

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    let dataKas = {}; let curSiswa = ""; let curWeek = 0;

    // Sinkronisasi Data
    onValue(dbRef, (s) => {
        dataKas = s.val() || {};
        // Jika sedang di view admin, refresh tampilannya
        if(!document.getElementById('viewAdmin').classList.contains('hidden')) renderAdmin();
    });

    // Ekspos Fungsi ke Window agar bisa dipanggil HTML
    window.gView = (id) => {
        document.querySelectorAll('[id^="view"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navAdmin').classList.toggle('active', id==='viewAdminLogin'||id==='viewAdmin');
        document.getElementById('navHome').classList.toggle('active', id==='viewLogin');
    };

    window.cekNama = () => {
        const key = document.getElementById('inNama').value.trim().toLowerCase();
        if(key.length < 2) return alert("Ketik minimal 2 huruf");
        const matches = daftarSiswa.filter(n => n.toLowerCase().includes(key));
        if(matches.length === 1) { curSiswa = matches[0]; showSiswa(); }
        else if(matches.length > 1) {
            const exact = matches.find(n => n.toLowerCase().split(' ').includes(key));
            if(exact) { curSiswa = exact; showSiswa(); }
            else alert("Ditemukan beberapa nama, coba lebih spesifik!");
        } else alert("Nama tidak ditemukan!");
    };

    function showSiswa() {
        window.gView('viewSiswa');
        document.getElementById('txtUser').innerText = curSiswa;
        let h = "";
        for(let i=1; i<=4; i++) {
            let s = dataKas[curSiswa.replace(/\s/g, '_') + "_m" + i] || "belum";
            let color = s==='lunas'?'var(--success)':(s==='pending'?'orange':'#8F9BB3');
            h += `<div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #eee;">
                <span style="font-weight:600">Minggu ${i}</span>
                <div>
                    <span style="color:${color}; font-weight:800; margin-right:10px; font-size:12px;">${s.toUpperCase()}</span>
                    ${s==='belum'?`<button onclick="openM(${i})" style="border:none; background:var(--primary); color:white; padding:6px 12px; border-radius:10px; font-size:10px; font-weight:700;">BAYAR</button>`:''}
                </div>
            </div>`;
        }
        document.getElementById('listMingguan').innerHTML = h;
    }

    window.openM = (w) => { curWeek = w; document.getElementById('modalPay').style.display='flex'; };
    window.closeM = () => document.getElementById('modalPay').style.display='none';
    document.getElementById('metod').onchange = (e) => { document.getElementById('qImg').style.display = e.target.value === 'qris' ? 'block' : 'none'; };

    window.konfirmasiWA = () => {
        const m = document.getElementById('metod').value;
        const key = curSiswa.replace(/\s/g, '_') + "_m" + curWeek;
        update(dbRef, { [key]: "pending" });
        window.open(`https://wa.me/62895630224260?text=Konfirmasi Kas *${curSiswa}* M${curWeek} (${m})`, '_blank');
        window.closeM();
    };

    window.authAdmin = () => {
        if(document.getElementById('pAdm').value === 'bendahara123') { window.gView('viewAdmin'); renderAdmin(); }
        else alert("Password Salah!");
    };

    function renderAdmin() {
        let total = 0, pend = 0;
        let h = daftarSiswa.map(n => {
            let row = `<div class="admin-item">
                <div style="font-size:13px; font-weight:700; color:#2E3A59; margin-bottom:8px;">${n}</div>
                <div style="display:flex; gap:20px;">`;
            for(let i=1; i<=4; i++) {
                let s = dataKas[n.replace(/\s/g, '_') + "_m" + i] || "belum";
                if(s==='lunas') total++; if(s==='pending') pend++;
                let icon = s==='lunas'?'✅':(s==='pending'?'⏳':'⬜');
                row += `<span class="status-btn" onclick="upStat('${n}', ${i}, '${s}')">${icon}</span>`;
            }
            return row + `</div></div>`;
        }).join('');
        document.getElementById('listAdmSiswa').innerHTML = h;
        // NOMINAL 5000 DISINI
        document.getElementById('admSaldo').innerText = "Rp" + (total * 5000).toLocaleString('id-ID');
        document.getElementById('admPend').innerText = pend;
    }

    window.upStat = (nama, minggu, current) => {
        let next = current === 'belum' ? 'pending' : (current === 'pending' ? 'lunas' : 'belum');
        const key = nama.replace(/\s/g, '_') + "_m" + minggu;
        update(dbRef, { [key]: next }).catch(e => alert("Error: " + e));
    };
</script>
</body>
</html>
