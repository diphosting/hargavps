<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas TKR-A Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --success: #00b09b;
            --danger: #ff416c; --warning: #f1c40f; --white: #ffffff;
        }

        /* Animasi Background Bergerak */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 15px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Card Container */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%; max-width: 450px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Hamburger Menu */
        .menu-btn {
            position: absolute; top: 20px; right: 20px;
            cursor: pointer; z-index: 100;
        }
        .menu-btn div { width: 25px; height: 3px; background: var(--secondary); margin: 5px; border-radius: 5px; transition: 0.3s; }

        .side-menu {
            position: absolute; top: 0; right: -100%;
            width: 70%; height: 100%; background: var(--white);
            z-index: 99; transition: 0.4s; padding-top: 60px;
            box-shadow: -10px 0 20px rgba(0,0,0,0.1);
        }
        .side-menu.active { right: 0; }
        .side-menu a { display: block; padding: 15px; color: var(--secondary); text-decoration: none; font-weight: 600; }

        /* Stats & Tables */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-item b { font-size: 16px; color: var(--secondary); }

        .scroll-table { overflow-x: auto; border-radius: 15px; background: white; padding: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        td, th { padding: 12px 8px; font-size: 13px; text-align: left; }
        
        /* Perbaikan Nama: Agar tidak terpotong */
        .name-col { font-weight: 600; color: #444; min-width: 120px; }

        input, button { border-radius: 15px; border: none; padding: 14px; margin-top: 10px; font-family: inherit; }
        input { width: 100%; background: #f0f2f5; box-sizing: border-box; }
        .btn-main { background: var(--secondary); color: white; width: 100%; font-weight: 700; cursor: pointer; }
        
        .hidden { display: none; }
        .qr-img { width: 200px; border-radius: 15px; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="side-menu" id="sideMenu">
        <a href="#" onclick="location.reload()">Refresh Halaman</a>
        <a href="#" onclick="gantiKeView('viewAdminLogin'); toggleMenu()">Login Bendahara</a>
        <a href="#" onclick="toggleMenu()">Tutup Menu</a>
    </div>

    <div id="viewLogin">
        <div style="background: var(--secondary); color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 11px; margin-bottom: 10px;" id="infoTglOtomatis">...</div>
        <h2 style="margin:0; color: #333;">Kas TKR-A</h2>
        <p style="font-size: 12px; color: #666;">Silahkan masukkan nama lengkap kamu</p>
        <input type="text" id="inputCariNama" placeholder="Contoh: Ardi atau Zainal">
        <button class="btn-main" onclick="prosesLoginSiswa()">Cek Status</button>
    </div>

    <div id="viewSiswa" class="hidden">
        <h3 id="namaUser" style="color: var(--secondary);"></h3>
        <div id="boxStatus" style="padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 13px;"></div>
        <div class="scroll-table">
            <table>
                <tbody id="listKasSiswa"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="location.reload()" style="background:#666;">Kembali</button>
    </div>

    <div id="viewAdminPanel" class="hidden">
        <h3 style="color: var(--secondary);">Panel Bendahara</h3>
        <div class="stats-grid">
            <div class="stat-item"><span>Saldo</span><br><b id="statSaldo">Rp0</b></div>
            <div class="stat-item"><span>Lunas</span><br><b id="statLunas">0</b></div>
        </div>
        <div class="scroll-table">
            <table>
                <thead id="headAdmin"></thead>
                <tbody id="bodyAdmin"></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="location.reload()" style="margin-top:20px;">Logout</button>
    </div>

    <div id="viewAdminLogin" class="hidden">
        <h3>Login Admin</h3>
        <input type="password" id="passAdmin" placeholder="Password">
        <button class="btn-main" onclick="prosesLoginAdmin()">Masuk</button>
    </div>
</div>

<div id="modalBayar" class="modal" onclick="tutupModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Scan Pembayaran</h3>
        <img src="https://files.catbox.moe/409cau.png" class="qr-img">
        <p style="font-size: 12px; color: #666;">Klik tombol di bawah setelah bayar</p>
        <button class="btn-main" onclick="kirimKonfirmasiWA()">Konfirmasi via WA</button>
        <button class="btn-main" onclick="tutupModal()" style="background:#666; margin-top:5px;">Tutup</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'kas_data');

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    let dbKas = {};
    let userAktif = "";
    let tempBayar = {};

    onValue(dbRef, (snap) => {
        dbKas = snap.val() || {};
        if (!document.getElementById('viewAdminPanel').classList.contains('hidden')) renderAdmin();
    });

    window.toggleMenu = () => document.getElementById('sideMenu').classList.toggle('active');
    
    window.gantiKeView = (id) => {
        document.querySelectorAll('[id^="view"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.prosesLoginSiswa = () => {
        const k = document.getElementById('inputCariNama').value.toLowerCase();
        if(k.length < 2) return alert("Ketik minimal 2 huruf");
        const match = daftarSiswa.filter(n => n.toLowerCase().includes(k));
        if(match.length === 1) { userAktif = match[0]; renderDashboardSiswa(match[0]); }
        else alert(match.length > 1 ? "Nama kurang spesifik" : "Nama tidak ditemukan");
    }

    function renderDashboardSiswa(nama) {
        gantiKeView('viewSiswa');
        document.getElementById('namaUser').innerText = nama;
        let html = "";
        for(let i=1; i<=4; i++) {
            let s = dbKas[nama.replace(/\s/g, '_') + "_m" + i] || "belum";
            let icon = s === 'lunas' ? '✅' : (s === 'pending' ? '⏳' : '⬜');
            html += `<tr><td>Minggu ${i}</td><td>${icon}</td><td>${s==='belum'?`<button class="btn-bayar" onclick="window.bayar(${i})">Bayar</button>`:'-'}</td></tr>`;
        }
        document.getElementById('listKasSiswa').innerHTML = html;
    }

    window.bayar = (m) => { tempBayar = {m}; document.getElementById('modalBayar').style.display='flex'; }
    window.tutupModal = () => document.getElementById('modalBayar').style.display='none';

    window.kirimKonfirmasiWA = () => {
        const key = userAktif.replace(/\s/g, '_') + "_m" + tempBayar.m;
        update(dbRef, { [key]: "pending" });
        window.open(`https://wa.me/62895630224260?text=Konfirmasi Kas ${userAktif} M${tempBayar.m}`, '_blank');
        tutupModal();
    }

    window.prosesLoginAdmin = () => {
        if(document.getElementById('passAdmin').value === "bendahara123") { gantiKeView('viewAdminPanel'); renderAdmin(); }
        else alert("Password Salah");
    }

    function renderAdmin() {
        document.getElementById('headAdmin').innerHTML = `<tr><th>Nama</th><th>M1</th><th>M2</th><th>M3</th><th>M4</th></tr>`;
        let totalLunas = 0;
        document.getElementById('bodyAdmin').innerHTML = daftarSiswa.map(n => {
            let row = `<tr><td class="name-col">${n.split(' ')[0]} ${n.split(' ')[1] || ''}</td>`;
            for(let i=1; i<=4; i++) {
                let s = dbKas[n.replace(/\s/g, '_') + "_m" + i] || "belum";
                if(s === 'lunas') totalLunas++;
                let icon = s === 'lunas' ? '✅' : (s === 'pending' ? '⏳' : '⬜');
                row += `<td onclick="window.upStatus('${n}',${i},'${s}')">${icon}</td>`;
            }
            return row + `</tr>`;
        }).join('');
        document.getElementById('statSaldo').innerText = "Rp" + (totalLunas * 2000).toLocaleString();
        document.getElementById('statLunas').innerText = totalLunas;
    }

    window.upStatus = (n, m, cur) => {
        let next = cur === 'belum' ? 'pending' : (cur === 'pending' ? 'lunas' : 'belum');
        update(dbRef, { [n.replace(/\s/g, '_') + "_m" + m]: next });
    }
</script>
</body>
</html>
