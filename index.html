<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekap Kas TKR-A</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FF3D71; --primary: #6236FF; --success: #00D68F;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Outfit', sans-serif; margin: 0; padding: 0;
            background: #060918; color: #1A1A1A; overflow-x: hidden;
        }

        /* Fun Moving Background */
        .bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 0% 0%, #1a1e3b 0%, #060918 100%);
        }
        .blob {
            position: absolute; width: 250px; height: 250px; background: var(--primary);
            filter: blur(80px); border-radius: 50%; opacity: 0.4; animation: drift 15s infinite alternate;
        }
        .blob.two { background: var(--accent); right: -50px; top: 20%; animation-duration: 18s; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 80px); } }

        /* Container */
        .app-frame { width: 100%; max-width: 450px; min-height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }

        /* Fun Header */
        header { padding: 40px 25px 30px; }
        header h1 { color: white; margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        header p { color: #8F9BB3; margin: 5px 0 0; font-size: 14px; }

        /* Main Card */
        .main-card {
            background: var(--glass); margin: 0 15px 20px; padding: 25px;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: popIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        @keyframes popIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }

        /* Fun Inputs */
        .search-box {
            background: #EDF1F7; border-radius: 20px; padding: 5px 15px;
            display: flex; align-items: center; margin: 20px 0;
        }
        input {
            border: none; background: transparent; padding: 15px 10px;
            width: 100%; font-size: 16px; font-family: inherit; outline: none;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--primary) 0%, #8C67FF 100%);
            color: white; border: none; width: 100%; padding: 18px;
            border-radius: 20px; font-size: 16px; font-weight: 700;
            box-shadow: 0 10px 20px rgba(98, 54, 255, 0.3); cursor: pointer;
        }

        /* Status & Table */
        .status-pill {
            padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 700;
            display: inline-block; margin-bottom: 10px;
        }
        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #edf1f7;
        }
        .name-txt { font-weight: 600; color: #2E3A59; font-size: 14px; }

        /* Floating Nav */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px); padding: 12px 25px;
            border-radius: 25px; display: flex; justify-content: space-around;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-link { text-decoration: none; color: #8F9BB3; font-size: 12px; font-weight: 600; text-align: center; }
        .nav-link.active { color: var(--primary); }

        .hidden { display: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
        .m-box { background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="blob"></div>
    <div class="blob two"></div>
</div>

<div class="app-frame">
    <header>
        <h1>REKAP KAS TKR-A</h1>
        <p>Copyright Tobias</p>
    </header>

    <div id="viewLogin" class="main-card">
        <h2 style="margin:0; font-size: 20px;">Siapa namamu?</h2>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="inNama" placeholder="Ketik namamu (Contoh: Ardi)">
        </div>
        <button class="btn-action" onclick="cekNama()">Cek Tagihan ✨</button>
    </div>

    <div id="viewSiswa" class="main-card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="txtUser" style="margin:0; font-size: 20px; color: var(--primary);">User</h2>
            <button onclick="location.reload()" style="background:none; border:none; font-size:18px;">❌</button>
        </div>
        <div id="tagihanBox" style="margin-top:15px;"></div>
        <div id="listMingguan"></div>
    </div>

    <div id="viewAdmin" class="main-card hidden">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <div style="background:#f7f9fc; padding:15px; border-radius:20px;">
                <small>Total Saldo</small><br><b id="admSaldo" style="color:var(--success)">Rp0</b>
            </div>
            <div style="background:#f7f9fc; padding:15px; border-radius:20px;">
                <small>Pending</small><br><b id="admPend" style="color:var(--accent)">0</b>
            </div>
        </div>
        <div style="max-height: 350px; overflow-y: auto;" id="listAdmSiswa"></div>
    </div>

    <div id="viewAdminLogin" class="main-card hidden">
        <h3>Akses Bendahara</h3>
        <input type="password" id="pAdm" class="search-box" style="background:#edf1f7; width:100%; box-sizing:border-box;" placeholder="Password">
        <button class="btn-action" onclick="authAdmin()">Login</button>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-link active" onclick="location.reload()">Beranda</a>
        <a href="#" class="nav-link" onclick="gView('viewAdminLogin')">Bendahara</a>
    </div>
</div>

<div id="modalPay" class="modal">
    <div class="m-box">
        <h3 style="margin-top:0;">Bayar Kas 💸</h3>
        <select id="metod" class="search-box" style="width:100%; background:#f7f9fc; border:none; padding:15px; border-radius:15px;">
            <option value="tunai">💵 Bayar Tunai</option>
            <option value="qris">📱 Scan QRIS</option>
        </select>
        <img id="qImg" src="https://files.catbox.moe/409cau.png" style="width:100%; border-radius:20px; margin: 15px 0; display:none;">
        <button class="btn-action" onclick="konfirmasiWA()">Konfirmasi WA</button>
        <p onclick="closeM()" style="margin-top:15px; cursor:pointer; font-weight:600; color:var(--accent)">Nanti Saja</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'kas_data');

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    let dataKas = {};
    let curSiswa = "";
    let curWeek = 0;

    onValue(dbRef, (s) => {
        dataKas = s.val() || {};
        if(!document.getElementById('viewAdmin').classList.contains('hidden')) renderAdmin();
    });

    window.gView = (id) => {
        document.querySelectorAll('[id^="view"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    };

    // LOGIKA PENCARIAN ARDI - SEARCH YANG LEBIH FUN & FLEXIBLE
    window.cekNama = () => {
        const key = document.getElementById('inNama').value.trim().toLowerCase();
        if(key.length < 2) return alert("Ketik minimal 2 huruf!");

        // 1. Cari kecocokan kata (misal 'ardi' akan mencocokkan 'ardiyansyah')
        const matches = daftarSiswa.filter(n => n.toLowerCase().includes(key));

        if(matches.length === 1) {
            curSiswa = matches[0];
            showSiswa();
        } else if(matches.length > 1) {
            // Jika banyak, cari yang mengandung kata tersebut secara utuh
            const exact = matches.find(n => n.toLowerCase().split(' ').includes(key));
            if(exact) { curSiswa = exact; showSiswa(); }
            else alert("Nama kurang spesifik!");
        } else {
            alert("Nama tidak ditemukan!");
        }
    };

    function showSiswa() {
        gView('viewSiswa');
        document.getElementById('txtUser').innerText = curSiswa;
        let h = ""; let nunggak = 0;
        for(let i=1; i<=4; i++) {
            let s = dataKas[curSiswa.replace(/\s/g, '_') + "_m" + i] || "belum";
            let color = s==='lunas'?'var(--success)':'#8F9BB3';
            if(s==='pending') color = 'var(--accent)';
            if(s==='belum') nunggak++;
            h += `<div class="item-row">
                <span class="name-txt">Minggu ${i}</span>
                <div style="display:flex; align-items:center;">
                    <span style="color:${color}; font-weight:700; font-size:12px; margin-right:10px;">${s.toUpperCase()}</span>
                    ${s==='belum'?`<button onclick="openM(${i})" style="border:none; background:var(--primary); color:white; border-radius:10px; padding:6px 12px; font-size:10px; font-weight:700;">BAYAR</button>`:''}
                </div>
            </div>`;
        }
        document.getElementById('listMingguan').innerHTML = h;
        document.getElementById('tagihanBox').innerHTML = nunggak > 0 ? `<div class="status-pill" style="background:#FFE6EB; color:var(--accent)">Kamu nunggak ${nunggak} minggu</div>` : `<div class="status-pill" style="background:#E6FFF7; color:var(--success)">Status: Lunas Aman! ✅</div>`;
    }

    window.openM = (w) => { curWeek = w; document.getElementById('modalPay').style.display='flex'; };
    window.closeM = () => document.getElementById('modalPay').style.display='none';
    document.getElementById('metod').onchange = (e) => { document.getElementById('qImg').style.display = e.target.value === 'qris' ? 'block' : 'none'; };

    window.konfirmasiWA = () => {
        const m = document.getElementById('metod').value;
        const key = curSiswa.replace(/\s/g, '_') + "_m" + curWeek;
        update(dbRef, { [key]: "pending" });
        window.open(`https://wa.me/62895630224260?text=Halo Bendahara, saya *${curSiswa}* mau bayar kas *Minggu ${curWeek}* via *${m.toUpperCase()}*`, '_blank');
        closeM();
    };

    window.authAdmin = () => {
        if(document.getElementById('pAdm').value === 'bendahara123') { gView('viewAdmin'); renderAdmin(); }
        else alert("Password Salah!");
    };

    function renderAdmin() {
        let total = 0, pend = 0;
        let h = daftarSiswa.map(n => {
            let row = `<div style="border-bottom:1px solid #eee; padding:10px 0;">
                <div style="font-size:13px; font-weight:700; margin-bottom:5px;">${n}</div>
                <div style="display:flex; gap:5px;">`;
            for(let i=1; i<=4; i++) {
                let s = dataKas[n.replace(/\s/g, '_') + "_m" + i] || "belum";
                if(s==='lunas') total++; if(s==='pending') pend++;
                let icon = s==='lunas'?'✅':(s==='pending'?'⏳':'⬜');
                row += `<div onclick="upStat('${n}',${i},'${s}')" style="cursor:pointer; font-size:18px;">${icon}</div>`;
            }
            return row + `</div></div>`;
        }).join('');
        document.getElementById('listAdmSiswa').innerHTML = h;
        document.getElementById('admSaldo').innerText = "Rp" + (total * 2000).toLocaleString();
        document.getElementById('admPend').innerText = pend;
    }

    window.upStat = (n, m, c) => {
        let next = c==='belum'?'pending':(c==='pending'?'lunas':'belum');
        update(dbRef, { [n.replace(/\s/g, '_') + "_m" + m]: next });
    };
</script>
</body>
</html>
