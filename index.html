<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas TKR-A Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --success: #00b09b;
            --danger: #ff416c; --warning: #f1c40f; --bg: #f0f4f8; --white: #ffffff;
            --grad-blue: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: var(--white); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(58, 123, 213, 0.15); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; }
        .admin-card { max-width: 1000px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-item { background: #f8fbff; padding: 10px; border-radius: 12px; border: 1px solid #edf2f7; }
        .stat-item span { display: block; font-size: 10px; color: #7f8c8d; }
        .stat-item b { font-size: 14px; color: var(--secondary); }
        h2 { color: var(--secondary); margin-bottom: 5px; }
        .badge-minggu { display: inline-block; background: var(--grad-blue); color: white; padding: 5px 15px; border-radius: 50px; font-size: 12px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eef2f7; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--grad-blue); color: white; }
        .btn-bayar { background: var(--success); color: white; padding: 6px 10px; border-radius: 8px; font-size: 11px; width: auto; }
        .btn-ghost { background: none; color: #b2bec3; font-size: 13px; }
        .status-box { margin: 20px 0; padding: 15px; border-radius: 15px; text-align: left; font-size: 13px; }
        .lunas-box { background: #dff9fb; color: #0984e3; border-left: 5px solid var(--primary); }
        .tunggakan-box { background: #fff5f5; color: #d63031; border-left: 5px solid var(--danger); }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th { padding: 10px; color: #636e72; font-size: 11px; }
        td { padding: 10px 5px; background: #f8fbff; border-bottom: 1px solid #edf2f7; font-size: 13px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 360px; text-align: center; }
        .qr-img { width: 100%; max-width: 220px; margin: 15px auto; display: block; border-radius: 10px; }
        .hidden { display: none; }
        .scroll-table { overflow-x: auto; max-height: 400px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="viewLogin" class="card">
    <div class="badge-minggu" id="infoTglOtomatis">Memuat...</div>
    <h2>💰 Kas TKR-A</h2>
    <p style="color:#7f8c8d; font-size: 14px;">Tahun Ajaran 2026</p>
    <input type="text" id="inputCariNama" placeholder="Ketik namamu (misal: Ardi)">
    <button class="btn-primary" onclick="prosesLoginSiswa()">Cek Status Kas</button>
    <button class="btn-ghost" onclick="gantiKeView('viewAdminLogin')">Login Bendahara</button>
</div>

<div id="viewSiswa" class="card hidden">
    <h2 id="namaUser">Halo!</h2>
    <div id="boxStatus" class="status-box"></div>
    <div class="scroll-table">
        <table>
            <thead><tr><th>Minggu</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="listKasSiswa"></tbody>
        </table>
    </div>
    <button class="btn-primary" onclick="location.reload()">Keluar</button>
</div>

<div id="viewAdminPanel" class="card admin-card hidden">
    <h2>Dashboard Bendahara</h2>
    <div class="stats-grid">
        <div class="stat-item"><span>Saldo Kas</span><b id="statSaldo">Rp0</b></div>
        <div class="stat-item"><span>Lunas</span><b id="statLunas">0</b></div>
        <div class="stat-item"><span>Pending</span><b id="statPending" style="color:var(--warning)">0</b></div>
        <div class="stat-item"><span>Zonk</span><b id="statZonk" style="color:var(--danger)">0</b></div>
    </div>
    <div class="scroll-table">
        <table>
            <thead id="headAdmin"></thead>
            <tbody id="bodyAdmin"></tbody>
        </table>
    </div>
    <button class="btn-primary" style="max-width:200px" onclick="location.reload()">Logout</button>
</div>

<div id="viewAdminLogin" class="card hidden">
    <h2>Login Admin</h2>
    <input type="password" id="passAdmin" placeholder="Password Bendahara">
    <button class="btn-primary" onclick="prosesLoginAdmin()">Masuk</button>
    <button class="btn-ghost" onclick="gantiKeView('viewLogin')">Batal</button>
</div>

<div id="modalBayar" class="modal">
    <div class="modal-content">
        <h3>Pilih Metode</h3>
        <select id="metodeBayar" onchange="toggleMetode()">
            <option value="qris">Scan QRIS</option>
            <option value="tunai">Bayar Tunai</option>
        </select>
        <div id="areaQRIS">
            <img src="https://files.catbox.moe/409cau.png" class="qr-img">
            <p style="font-size: 11px; color: #7f8c8d;">Scan QRIS di atas untuk membayar</p>
        </div>
        <div id="areaTunai" class="hidden">
            <p style="padding:15px; background:#f8f9fa; border-radius:10px; font-size:13px;">Segera serahkan uang tunai ke Bendahara setelah klik konfirmasi.</p>
        </div>
        <button class="btn-primary" onclick="kirimKonfirmasiWA()">Konfirmasi & Kirim WA</button>
        <button class="btn-ghost" style="color:var(--danger)" onclick="tutupModal()">Batal</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // CONFIGURASI FIREBASE KAMU
    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'kas_data');

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    const NO_WA = "62895630224260";
    const NOMINAL = 2000;
    let dbKas = {};
    let currentSiswa = "";

    // Sinkronisasi Real-time
    onValue(dbRef, (snapshot) => {
        dbKas = snapshot.val() || {};
        if (!document.getElementById('viewAdminPanel').classList.contains('hidden')) renderAdmin();
        if (!document.getElementById('viewSiswa').classList.contains('hidden')) renderDashboardSiswa(currentSiswa);
    });

    function getMinggu() {
        const tglMulai = new Date("2026-02-01");
        const diff = Math.floor((new Date() - tglMulai) / (1000*60*60*24));
        return Math.max(1, Math.floor(diff / 7) + 1);
    }
    const MINGGU_INI = getMinggu();
    document.getElementById('infoTglOtomatis').innerText = `Minggu ke-${MINGGU_INI}`;

    window.gantiKeView = (id) => {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.prosesLoginSiswa = () => {
        const key = document.getElementById('inputCariNama').value.trim().toLowerCase();
        if(key.length < 2) return alert("Ketik minimal 2 huruf!");
        const match = daftarSiswa.filter(n => n.toLowerCase().includes(key));
        if(match.length === 1) { currentSiswa = match[0]; renderDashboardSiswa(match[0]); }
        else if(match.length > 1) alert("Nama kurang spesifik!");
        else alert("Nama tidak ditemukan!");
    };

    function renderDashboardSiswa(nama) {
        gantiKeView('viewSiswa');
        document.getElementById('namaUser').innerText = "Halo, " + nama.split(' ')[0];
        let html = ""; let nunggak = 0;
        for(let i=1; i<=Math.max(4, MINGGU_INI); i++) {
            let status = dbKas[nama.replace(/\s/g, '_') + "_m" + i] || "belum";
            let txt = "❌ Belum"; let col = "#e74c3c";
            if(status === "lunas") { txt = "✅ Lunas"; col = "#2ecc71"; }
            else if(status === "pending") { txt = "⏳ Pending"; col = "#f1c40f"; }
            else nunggak++;
            html += `<tr><td>M${i}</td><td style="color:${col}; font-weight:bold">${txt}</td><td>${status==='belum'?`<button class="btn-bayar" onclick="window.bukaModal('${nama}',${i})">BAYAR</button>`:'-'}</td></tr>`;
        }
        document.getElementById('listKasSiswa').innerHTML = html;
        document.getElementById('boxStatus').className = nunggak > 0 ? "status-box tunggakan-box" : "status-box lunas-box";
        document.getElementById('boxStatus').innerHTML = nunggak > 0 ? `⚠️ Kamu nunggak <b>${nunggak}</b> minggu.` : `✨ Semua lunas!`;
    }

    let tempBayar = {};
    window.bukaModal = (n, m) => { tempBayar = {n, m}; document.getElementById('modalBayar').style.display='flex'; };
    window.tutupModal = () => document.getElementById('modalBayar').style.display='none';
    window.toggleMetode = () => {
        const v = document.getElementById('metodeBayar').value;
        document.getElementById('areaQRIS').classList.toggle('hidden', v !== 'qris');
        document.getElementById('areaTunai').classList.toggle('hidden', v !== 'tunai');
    };

    window.kirimKonfirmasiWA = () => {
        const key = tempBayar.n.replace(/\s/g, '_') + "_m" + tempBayar.m;
        update(dbRef, { [key]: "pending" });
        const msg = `Halo Bendahara, saya *${tempBayar.n}* konfirmasi bayar kas *M${tempBayar.m}* via *${document.getElementById('metodeBayar').value.toUpperCase()}*`;
        window.open(`https://wa.me/${NO_WA}?text=${encodeURIComponent(msg)}`, '_blank');
        tutupModal();
    };

    window.prosesLoginAdmin = () => {
        if(document.getElementById('passAdmin').value === "bendahara123") { gantiKeView('viewAdminPanel'); renderAdmin(); }
        else alert("Salah!");
    };

    function renderAdmin() {
        let limit = Math.max(4, MINGGU_INI);
        let totalLunas = 0, totalPending = 0, zonk = 0;
        document.getElementById('headAdmin').innerHTML = `<tr><th>Nama</th>${Array.from({length:limit},(_,i)=>`<th>M${i+1}</th>`).join('')}</tr>`;
        document.getElementById('bodyAdmin').innerHTML = daftarSiswa.map(n => {
            let row = `<tr><td>${n.split(' ')[0]}</td>`;
            let count = 0;
            for(let i=1; i<=limit; i++) {
                let status = dbKas[n.replace(/\s/g, '_') + "_m" + i] || "belum";
                let icon = status==='lunas'?'✅':(status==='pending'?'⏳':'⬜');
                if(status==='lunas') { totalLunas++; count++; }
                if(status==='pending') totalPending++;
                row += `<td onclick="window.updateStatus('${n}',${i},'${status}')" style="cursor:pointer">${icon}</td>`;
            }
            if(count === 0) zonk++;
            return row + `</tr>`;
        }).join('');
        document.getElementById('statSaldo').innerText = "Rp" + (totalLunas * NOMINAL).toLocaleString();
        document.getElementById('statLunas').innerText = totalLunas;
        document.getElementById('statPending').innerText = totalPending;
        document.getElementById('statZonk').innerText = zonk;
    }

    window.updateStatus = (n, m, cur) => {
        let next = cur === 'belum' ? 'pending' : (cur === 'pending' ? 'lunas' : 'belum');
        update(dbRef, { [n.replace(/\s/g, '_') + "_m" + m]: next });
    };
</script>
</body>
</html>
