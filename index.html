<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kas TKR-A iOS</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-blue: #007AFF; --ios-bg: #F2F2F7; --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Poppins', sans-serif;
            margin: 0; padding: 0; background: #000; overflow: hidden;
        }

        /* iOS Dynamic Background */
        .wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(125deg, #1e3c72 0%, #2a5298 50%, #121212 100%);
        }

        .floating-objects { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .obj { 
            position: absolute; background: rgba(255,255,255,0.08); 
            animation: float 18s infinite linear; bottom: -100px;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Main Container */
        .iphone-container {
            width: 100%; max-width: 420px; height: 100vh; margin: 0 auto;
            background: transparent; display: flex; flex-direction: column; position: relative;
        }

        /* iOS Header */
        header {
            padding: 40px 25px 20px; color: white;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -1px; }

        /* Card View */
        .content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        
        .ios-card {
            background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* iOS Inputs */
        .ios-input {
            width: 100%; background: rgba(0,0,0,0.05); border: none;
            padding: 15px; border-radius: 12px; font-size: 16px; margin: 15px 0;
            box-sizing: border-box; outline: none;
        }

        .btn-ios {
            background: var(--ios-blue); color: white; border: none;
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 17px; font-weight: 600; cursor: pointer;
            transition: 0.2s;
        }
        .btn-ios:active { transform: scale(0.97); opacity: 0.8; }

        /* Table iOS Style */
        .ios-table { width: 100%; border-collapse: collapse; }
        .ios-table td { padding: 14px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.05); font-size: 14px; }
        .name-row { font-weight: 600; color: #1c1c1e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

        /* Bottom Tab Bar */
        .tab-bar {
            position: absolute; bottom: 0; width: 100%;
            height: 85px; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px); display: flex;
            justify-content: space-around; align-items: center;
            border-top: 0.5px solid #d1d1d6;
        }
        .tab-item { text-align: center; color: #8e8e93; font-size: 11px; font-weight: 500; cursor: pointer; }
        .tab-item.active { color: var(--ios-blue); }

        .hidden { display: none; }

        /* Modal iOS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 999; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 300px; border-radius: 14px; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="wallpaper">
    <div class="floating-objects" id="objs"></div>
</div>

<div class="iphone-container">
    <header>
        <h1 id="headerTitle">Kas TKR-A</h1>
        <p style="margin:5px 0 0; opacity: 0.6; font-size: 13px;">SMK Negeri 1 Adiwerna</p>
    </header>

    <div class="content">
        <div id="viewLogin" class="ios-card">
            <h3 style="margin-top:0;">Halo, Siswa!</h3>
            <p style="color:#666; font-size: 14px;">Masukkan nama untuk melihat laporan kas mingguanmu.</p>
            <input type="text" id="inputNama" class="ios-input" placeholder="Nama kamu...">
            <button class="btn-ios" onclick="loginSiswa()">Lanjutkan</button>
        </div>

        <div id="viewSiswa" class="hidden">
            <div class="ios-card">
                <h3 id="displayNama" style="margin-top:0; color:var(--ios-blue);">Nama Siswa</h3>
                <div id="summary" style="font-size: 13px; margin-bottom: 15px; padding: 10px; border-radius: 10px;"></div>
                <table class="ios-table">
                    <tbody id="listSiswa"></tbody>
                </table>
            </div>
            <button class="btn-ios" style="background:#8e8e93;" onclick="location.reload()">Selesai</button>
        </div>

        <div id="viewAdmin" class="hidden">
            <div class="ios-card" style="display:flex; justify-content:space-between; text-align:center;">
                <div><small>Saldo</small><br><b id="totalKas" style="color:var(--ios-blue)">Rp0</b></div>
                <div><small>Pending</small><br><b id="totalPend" style="color:#FF9500">0</b></div>
            </div>
            <div class="ios-card" style="padding: 10px; overflow-x: auto;">
                <table class="ios-table">
                    <tbody id="bodyAdmin"></tbody>
                </table>
            </div>
        </div>

        <div id="viewAdminLogin" class="hidden">
            <div class="ios-card">
                <h3>Admin Login</h3>
                <input type="password" id="passAdmin" class="ios-input" placeholder="Password...">
                <button class="btn-ios" onclick="loginAdmin()">Masuk</button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="location.reload()">
            <div style="font-size: 22px;">🏠</div>
            <span>Beranda</span>
        </div>
        <div class="tab-item" onclick="gantiView('viewAdminLogin')">
            <div style="font-size: 22px;">⚙️</div>
            <span>Admin</span>
        </div>
    </div>
</div>

<div id="modalPay" class="modal">
    <div class="modal-content">
        <h4 style="margin-top:0;">Metode Bayar</h4>
        <select id="metode" onchange="showQR()" class="ios-input" style="background: #f2f2f7;">
            <option value="tunai">Uang Tunai</option>
            <option value="qris">Scan QRIS</option>
        </select>
        <img id="imgQR" src="https://files.catbox.moe/409cau.png" style="width:100%; display:none; border-radius:10px; margin-bottom:15px;">
        <button class="btn-ios" onclick="konfirmasiWA()">Konfirmasi</button>
        <p onclick="closeModal()" style="color:var(--ios-blue); cursor:pointer; margin-top:15px; font-weight:600;">Batal</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'kas_data');

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    let dataKas = {};
    let activeUser = "";
    let activeWeek = 0;

    // BG Animation
    const objs = document.getElementById('objs');
    const shapes = ['30px','50px','70px'];
    for(let i=0; i<12; i++){
        const o = document.createElement('div');
        o.className = 'obj';
        let size = shapes[Math.floor(Math.random()*3)];
        o.style.width = size; o.style.height = size;
        o.style.left = Math.random()*100+'%';
        o.style.animationDuration = (10+Math.random()*15)+'s';
        o.style.animationDelay = Math.random()*10+'s';
        if(Math.random()>0.5) o.style.borderRadius = '50%';
        objs.appendChild(o);
    }

    onValue(dbRef, (s) => {
        dataKas = s.val() || {};
        if(!document.getElementById('viewAdmin').classList.contains('hidden')) renderAdmin();
    });

    window.gantiView = (id) => {
        document.querySelectorAll('[id^="view"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        if(id === 'viewAdminLogin') document.querySelectorAll('.tab-item')[1].classList.add('active');
    };

    // SEARCH LOGIC: ANTI GAGAL UNTUK ARDI
    window.loginSiswa = () => {
        const inputRaw = document.getElementById('inputNama').value.trim().toLowerCase();
        if(inputRaw.length < 2) return alert("Masukkan minimal 2 huruf");

        // Normalisasi: Hapus semua titik dan spasi untuk pengecekan
        const inputClean = inputRaw.replace(/[\s.]/g, "");

        const match = daftarSiswa.filter(nama => {
            const namaClean = nama.toLowerCase().replace(/[\s.]/g, "");
            return namaClean.includes(inputClean);
        });

        if(match.length === 1) {
            activeUser = match[0];
            renderSiswa();
        } else if(match.length > 1) {
            // Jika mengetik 'ardi', cari yang mengandung kata 'ardi' secara utuh
            const exact = match.find(n => n.toLowerCase().split(' ').includes(inputRaw));
            if(exact) { activeUser = exact; renderSiswa(); }
            else alert("Nama kurang spesifik, coba lebih lengkap!");
        } else {
            alert("Nama tidak ditemukan!");
        }
    };

    function renderSiswa() {
        gantiView('viewSiswa');
        document.getElementById('displayNama').innerText = activeUser;
        let html = ""; let nunggak = 0;
        for(let i=1; i<=4; i++){
            let s = dataKas[activeUser.replace(/\s/g, '_') + "_m" + i] || "belum";
            let color = s==='lunas'?'#34C759':(s==='pending'?'#FF9500':'#FF3B30');
            if(s==='belum') nunggak++;
            html += `<tr>
                <td>Minggu ${i}</td>
                <td style="color:${color}; font-weight:600;">${s.toUpperCase()}</td>
                <td>${s==='belum'?`<button onclick="openPay(${i})" style="border:none; background:var(--ios-blue); color:white; border-radius:8px; padding:6px 12px; font-size:11px;">Bayar</button>`:'-'}</td>
            </tr>`;
        }
        document.getElementById('listSiswa').innerHTML = html;
        const sum = document.getElementById('summary');
        sum.style.background = nunggak > 0 ? '#FF3B3015' : '#34C75915';
        sum.style.color = nunggak > 0 ? '#FF3B30' : '#34C759';
        sum.innerHTML = nunggak > 0 ? `⚠️ Kamu memiliki <b>${nunggak}</b> tagihan.` : `✨ <b>Lunas!</b> Kamu sangat rajin.`;
    }

    window.openPay = (m) => { activeWeek = m; document.getElementById('modalPay').style.display='flex'; };
    window.closeModal = () => document.getElementById('modalPay').style.display='none';
    window.showQR = () => { document.getElementById('imgQR').style.display = document.getElementById('metode').value === 'qris' ? 'block' : 'none'; };

    window.konfirmasiWA = () => {
        const m = document.getElementById('metode').value;
        const key = activeUser.replace(/\s/g, '_') + "_m" + activeWeek;
        update(dbRef, { [key]: "pending" });
        window.open(`https://wa.me/62895630224260?text=Konfirmasi Kas: *${activeUser}* (Minggu ${activeWeek}) via *${m.toUpperCase()}*`, '_blank');
        closeModal();
    };

    window.loginAdmin = () => {
        if(document.getElementById('passAdmin').value === "bendahara123") {
            gantiView('viewAdmin'); renderAdmin();
        } else alert("Salah!");
    };

    function renderAdmin() {
        let total = 0, pend = 0;
        document.getElementById('bodyAdmin').innerHTML = daftarSiswa.map(n => {
            let row = `<td class="name-row">${n}</td>`;
            for(let i=1; i<=4; i++){
                let s = dataKas[n.replace(/\s/g, '_') + "_m" + i] || "belum";
                if(s==='lunas') total++; if(s==='pending') pend++;
                let icon = s==='lunas'?'✅':(s==='pending'?'⏳':'⬜');
                row += `<td onclick="upStat('${n}',${i},'${s}')" style="cursor:pointer; text-align:center;">${icon}</td>`;
            }
            return `<tr>${row}</tr>`;
        }).join('');
        document.getElementById('totalKas').innerText = "Rp" + (total * 2000).toLocaleString('id-ID');
        document.getElementById('totalPend').innerText = pend;
    }

    window.upStat = (n, m, c) => {
        let next = c === 'belum' ? 'pending' : (c === 'pending' ? 'lunas' : 'belum');
        update(dbRef, { [n.replace(/\s/g, '_') + "_m" + m]: next });
    };
</script>
</body>
</html>
