<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAS TKR-A</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF3D71; --primary: #6236FF; --success: #00D68F; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Outfit', sans-serif; margin: 0; padding: 0; background: #060918; color: #1A1A1A; overflow-x: hidden; }
        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 0% 0%, #1a1e3b 0%, #060918 100%); }
        .app-frame { width: 100%; max-width: 450px; min-height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }
        header { padding: 30px 25px 10px; text-align: center; color: white; }
        .main-card { background: var(--glass); margin: 0 15px 100px; padding: 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .search-box { background: #EDF1F7; border-radius: 15px; padding: 12px 15px; margin: 15px 0; display: flex; align-items: center; border:none; width:100%; box-sizing:border-box; }
        input { border: none; background: transparent; width: 100%; outline: none; font-family: inherit; font-size: 16px; }
        .btn-action { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .admin-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .status-btn { font-size: 22px; cursor: pointer; padding: 3px; display: inline-block; -webkit-tap-highlight-color: transparent; }
        
        /* PROGRESS BAR */
        .progress-container { background: #e0e0e0; border-radius: 10px; height: 8px; width: 100%; margin: 8px 0; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; transition: 0.5s; width: 0%; }
        .progress-text { font-size: 11px; font-weight: 700; color: #666; }

        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: white; padding: 12px; border-radius: 20px; display: flex; justify-content: space-around; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 100; }
        .nav-link { text-decoration: none; color: #8F9BB3; font-weight: 600; font-size: 14px; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .hidden { display: none; }
        .scroll-area { max-height: 400px; overflow-y: auto; padding-right: 5px; margin-top:15px; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
        .m-box { background: white; padding: 25px; border-radius: 25px; width: 85%; text-align: center; box-sizing: border-box;}
    </style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="app-frame">
    <header><h1>KAS TKR-A 🚀</h1><p style="opacity:0.7">Powered By Tobias</p></header>

    <div id="viewLogin" class="main-card">
        <h3 style="margin:0;">Cek Tabungan Kas</h3>
        <div class="search-box"><input type="text" id="inNama" placeholder="Ketik namamu (Contoh: Tobias)"></div>
        <button class="btn-action" onclick="cekNama()" style="width:100%;">Cek Progress ✨</button>
    </div>

    <div id="viewSiswa" class="main-card hidden">
        <h2 id="txtUser" style="color: var(--primary); margin:0;">User</h2>
        <div id="progUserContainer"></div>
        <div id="listMingguan" class="scroll-area"></div>
        <button class="btn-action" onclick="window.location.reload()" style="background:#8F9BB3; margin-top:20px; width:100%;">Kembali</button>
    </div>

    <div id="viewAdmin" class="main-card hidden">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <div style="background:#f0f3f8; padding:12px; border-radius:15px;">Total Kas:<br><b id="admSaldo" style="color:var(--success);">Rp0</b></div>
            <div style="background:#f0f3f8; padding:12px; border-radius:15px;">Lunas 75K:<br><b id="admLunasCount" style="color:var(--primary);">0</b></div>
        </div>
        <div class="scroll-area" id="listAdmSiswa"></div>
    </div>

    <div id="viewAdminLogin" class="main-card hidden">
        <h3>Akses Bendahara</h3>
        <input type="password" id="pAdm" class="search-box" placeholder="Password">
        <button class="btn-action" onclick="authAdmin()" style="width:100%;">Login</button>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" id="navHome" onclick="window.location.reload()">Beranda</div>
        <div class="nav-link" id="navAdmin" onclick="gView('viewAdminLogin')">Admin</div>
    </div>
</div>

<div id="modalPay" class="modal">
    <div class="m-box">
        <h3 style="margin-top:0;">Bayar Kas 💸</h3>
        <select id="metod" class="search-box" style="margin-bottom:15px;">
            <option value="tunai">💵 Bayar Tunai</option>
            <option value="qris">📱 Scan QRIS</option>
        </select>
        <img id="qImg" src="https://files.catbox.moe/409cau.png" style="width:100%; border-radius:15px; display:none; margin-bottom:15px;">
        <button class="btn-action" onclick="konfirmasiWA()" style="width:100%;">Kirim Bukti WA</button>
        <p onclick="closeM()" style="color:var(--accent); cursor:pointer; margin-top:15px; font-weight:700;">Batal</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'kas_data');

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    let dataKas = {}; let curSiswa = ""; let curWeek = 0;
    const JML_MINGGU = 15;
    const HARGA_PER_MINGGU = 5000;
    const TARGET_TOTAL = 75000;

    onValue(dbRef, (s) => {
        dataKas = s.val() || {};
        if(!document.getElementById('viewAdmin').classList.contains('hidden')) renderAdmin();
        if(!document.getElementById('viewSiswa').classList.contains('hidden')) showSiswa();
    });

    const cleanKey = (name) => name.replace(/[\s.]/g, "_");

    window.gView = (id) => {
        document.querySelectorAll('[id^="view"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('navAdmin').classList.toggle('active', id.includes('Admin'));
        document.getElementById('navHome').classList.toggle('active', id === 'viewLogin');
    };

    window.cekNama = () => {
        const key = document.getElementById('inNama').value.trim().toLowerCase();
        if(key.length < 2) return alert("Ketik minimal 2 huruf");
        const matches = daftarSiswa.filter(n => n.toLowerCase().replace(/[\s.]/g, "").includes(key.replace(/[\s.]/g, "")));
        if(matches.length === 1) { curSiswa = matches[0]; showSiswa(); }
        else if(matches.length > 1) {
            const exact = matches.find(n => n.toLowerCase().includes(key));
            if(exact) { curSiswa = exact; showSiswa(); }
            else alert("Ada beberapa nama, coba ketik lebih lengkap!");
        } else alert("Nama tidak ditemukan!");
    };

    window.showSiswa = () => {
        window.gView('viewSiswa');
        document.getElementById('txtUser').innerText = curSiswa;
        let h = ""; let lunasCount = 0;
        
        for(let i=1; i<=JML_MINGGU; i++) {
            let s = dataKas[cleanKey(curSiswa) + "_m" + i] || "belum";
            if(s === 'lunas') lunasCount++;
            let color = s==='lunas'?'var(--success)':(s==='pending'?'orange':'#8F9BB3');
            h += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee; align-items:center;">
                <span style="font-size:14px; font-weight:600;">Minggu ${i}</span>
                <div style="display:flex; align-items:center;">
                    <span style="color:${color}; font-weight:800; font-size:11px; margin-right:10px;">${s.toUpperCase()}</span>
                    ${s==='belum'?`<button onclick="openM(${i})" style="border:none; background:var(--primary); color:white; padding:6px 10px; border-radius:8px; font-size:10px; font-weight:700;">BAYAR</button>`:''}
                </div>
            </div>`;
        }
        
        const totalBayar = lunasCount * HARGA_PER_MINGGU;
        const persen = Math.floor((totalBayar / TARGET_TOTAL) * 100);
        
        document.getElementById('progUserContainer').innerHTML = `
            <div class="progress-text" style="margin-top:10px">Terkumpul: Rp${totalBayar.toLocaleString()} / Rp75.000</div>
            <div class="progress-container"><div class="progress-bar" style="width:${persen}%"></div></div>
            <div class="progress-text">${persen}% Progres</div>`;
        document.getElementById('listMingguan').innerHTML = h;
    }

    // FUNGSI MODAL
    window.openM = (w) => { curWeek = w; document.getElementById('modalPay').style.display='flex'; };
    window.closeM = () => document.getElementById('modalPay').style.display='none';
    document.getElementById('metod').onchange = (e) => { document.getElementById('qImg').style.display = e.target.value === 'qris' ? 'block' : 'none'; };

    window.konfirmasiWA = () => {
        const m = document.getElementById('metod').value;
        const key = cleanKey(curSiswa) + "_m" + curWeek;
        update(dbRef, { [key]: "pending" });
        window.open(`https://wa.me/62895630224260?text=Konfirmasi Kas *${curSiswa}* M${curWeek} (${m})`, '_blank');
        window.closeM();
    };

    window.authAdmin = () => {
        if(document.getElementById('pAdm').value === 'bendahara123') { window.gView('viewAdmin'); renderAdmin(); }
        else alert("Salah!");
    };

    window.renderAdmin = () => {
        let totalGlobal = 0; let totalLunasSiswa = 0;
        let h = daftarSiswa.map(n => {
            let sLunas = 0;
            let row = `<div class="admin-item">
                <div style="font-size:13px; font-weight:700;">${n}</div>`;
            
            let btnRow = `<div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">`;
            for(let i=1; i<=JML_MINGGU; i++) {
                let s = dataKas[cleanKey(n) + "_m" + i] || "belum";
                if(s==='lunas') { totalGlobal++; sLunas++; }
                let icon = s==='lunas'?'✅':(s==='pending'?'⏳':'⬜');
                btnRow += `<span class="status-btn" onclick="window.upStat('${n}', ${i}, '${s}')">${icon}</span>`;
            }
            if(sLunas === JML_MINGGU) totalLunasSiswa++;
            
            const p = Math.floor(((sLunas * HARGA_PER_MINGGU) / TARGET_TOTAL) * 100);
            return row + `<div class="progress-container"><div class="progress-bar" style="width:${p}%"></div></div>` + btnRow + `</div></div>`;
        }).join('');
        
        document.getElementById('listAdmSiswa').innerHTML = h;
        document.getElementById('admSaldo').innerText = "Rp" + (totalGlobal * HARGA_PER_MINGGU).toLocaleString('id-ID');
        document.getElementById('admLunasCount').innerText = totalLunasSiswa + " Orang";
    }

    window.upStat = (nama, minggu, current) => {
        let next = current === 'belum' ? 'pending' : (current === 'pending' ? 'lunas' : 'belum');
        update(dbRef, { [cleanKey(nama) + "_m" + minggu]: next });
    };
</script>
</body>
</html>
