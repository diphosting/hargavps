<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kas Kelas v5.0</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; }
        .admin-card { max-width: 900px; }

        h2 { color: var(--dark); margin-bottom: 10px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; }

        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-primary:hover { background: #2980b9; }
        .btn-ghost { background: none; color: #bdc3c7; margin-top: 20px; font-size: 13px; }

        .status-box { margin: 20px 0; padding: 15px; border-radius: 12px; text-align: left; font-size: 14px; }
        .lunas-box { background: #eafaf1; color: #27ae60; border: 1px solid #d5f5e3; }
        .tunggakan-box { background: #fdf2f2; color: #e74c3c; border: 1px solid #fadbd8; }
        
        table { width: 100%; margin-top: 15px; border-collapse: collapse; background: #fff; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: var(--dark); }
        
        .checkbox-custom { width: 20px; height: 20px; cursor: pointer; }
        .hidden { display: none; }
        .scroll-table { overflow-x: auto; margin-top: 15px; border-radius: 10px; border: 1px solid #eee; }

        @media (max-width: 480px) { .card { padding: 20px; } }
    </style>
</head>
<body>

<div id="viewLogin" class="card">
    <h2>💰 Kas Kelas</h2>
    <p class="subtitle">Februari 2026 - Minggu 1 s/d 4</p>
    <input type="text" id="inputCariNama" placeholder="Ketik nama panggilanmu...">
    <button class="btn-primary" onclick="prosesLoginSiswa()">Cek Status Kas</button>
    <button class="btn-ghost" onclick="gantiKeView('viewAdminLogin')">Login Bendahara</button>
</div>

<div id="viewSiswa" class="card hidden">
    <h2 id="namaUser">Halo!</h2>
    <div id="boxStatus" class="status-box"></div>
    <table>
        <thead>
            <tr><th>Periode</th><th>Status</th></tr>
        </thead>
        <tbody id="listKasSiswa"></tbody>
    </table>
    <button class="btn-primary" style="margin-top:20px" onclick="location.reload()">Kembali</button>
</div>

<div id="viewAdminLogin" class="card hidden">
    <h2>Login Admin</h2>
    <p class="subtitle">Khusus Bendahara Kelas</p>
    <input type="password" id="passAdmin" placeholder="Masukkan Password Rahasia">
    <button class="btn-primary" onclick="prosesLoginAdmin()">Masuk ke Panel</button>
    <button class="btn-ghost" onclick="location.reload()">Batal</button>
</div>

<div id="viewAdminPanel" class="card admin-card hidden">
    <h2>Panel Pengaturan Kas</h2>
    <p>Klik kotak untuk mengubah status (Otomatis Tersimpan)</p>
    <div class="scroll-table">
        <table>
            <thead>
                <tr>
                    <th>Nama Siswa</th>
                    <th>M1</th><th>M2</th><th>M3</th><th>M4</th>
                </tr>
            </thead>
            <tbody id="tabelMasterAdmin"></tbody>
        </table>
    </div>
    <button class="btn-primary" style="margin-top:25px; max-width: 200px;" onclick="location.reload()">Keluar & Logout</button>
</div>

<script>
    // DATA MASTER
    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Rafi Al Fakhri", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    const PASSWORD_BNDHR = "bendahara123"; // GANTI PASSWORD DI SINI
    let dbKas = JSON.parse(localStorage.getItem('db_kas_final')) || {};

    // FUNGSI NAVIGASI
    function gantiKeView(idTujuan) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(idTujuan).classList.remove('hidden');
    }

    // LOGIKA SISWA
    function prosesLoginSiswa() {
        const keyword = document.getElementById('inputCariNama').value.trim().toLowerCase();
        
        if (keyword.length < 3) {
            alert("Ketik minimal 3 huruf agar pencarian tepat!");
            return;
        }

        const matches = daftarSiswa.filter(n => n.toLowerCase().includes(keyword));

        if (matches.length === 1) {
            tampilkanDashboardSiswa(matches[0]);
        } else if (matches.length > 1) {
            alert("Ada " + matches.length + " nama yang mirip. Coba ketik lebih lengkap!");
        } else {
            alert("Nama tidak ditemukan dalam daftar kelas.");
        }
    }

    function tampilkanDashboardSiswa(namaLengkap) {
        gantiKeView('viewSiswa');
        document.getElementById('namaUser').innerText = "Halo, " + namaLengkap;
        
        let htmlList = "";
        let nunggak = 0;

        for(let i=1; i<=4; i++) {
            let lunas = dbKas[namaLengkap + "_m" + i] || false;
            if(!lunas) nunggak++;
            htmlList += `
                <tr>
                    <td>Minggu ke-${i}</td>
                    <td style="font-weight:bold; color:${lunas ? '#2ecc71' : '#e74c3c'}">
                        ${lunas ? '✅ Lunas' : '❌ Belum Bayar'}
                    </td>
                </tr>`;
        }

        const box = document.getElementById('boxStatus');
        box.className = "status-box " + (nunggak > 0 ? "tunggakan-box" : "lunas-box");
        box.innerHTML = nunggak > 0 
            ? `<strong>Peringatan:</strong> Kamu punya <b>${nunggak}</b> minggu yang belum dibayar.` 
            : `<strong>Hebat!</strong> Pembayaran kasmu sudah lengkap bulan ini.`;
            
        document.getElementById('listKasSiswa').innerHTML = htmlList;
    }

    // LOGIKA ADMIN
    function prosesLoginAdmin() {
        if(document.getElementById('passAdmin').value === PASSWORD_BNDHR) {
            gantiKeView('viewAdminPanel');
            renderPanelAdmin();
        } else {
            alert("Password Salah!");
        }
    }

    function renderPanelAdmin() {
        const body = document.getElementById('tabelMasterAdmin');
        body.innerHTML = "";
        
        daftarSiswa.forEach(nama => {
            let row = `<tr><td>${nama}</td>`;
            for(let m=1; m<=4; m++) {
                let key = nama + "_m" + m;
                let isLunas = dbKas[key] || false;
                row += `<td style="text-align:center">
                            <input type="checkbox" class="checkbox-custom" 
                            ${isLunas ? 'checked' : ''} 
                            onchange="updateData('${key}')">
                        </td>`;
            }
            row += `</tr>`;
            body.innerHTML += row;
        });
    }

    function updateData(key) {
        dbKas[key] = !dbKas[key];
        localStorage.setItem('db_kas_final', JSON.stringify(dbKas));
    }
</script>
</body>
</html>
